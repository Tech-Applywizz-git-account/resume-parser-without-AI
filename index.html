    <div class="app-container">
        <div class="dashboard" id="dashboard" style="display: none;">
            
            <div class="panel">
                <div class="panel-header"><span class="panel-title">Universal Identity</span></div>

                        <div id="cert-list"></div>
                    </div>
                </div>

                <div class="panel-header"><span class="panel-title">Structural Intelligence</span></div>

                        <div class="section-header">EXPERIENCE</div>
                        <div id="experience-list"></div>
                    </div>
                    <div class="section-block">
                        <div class="section-header">PROJECTS</div>
                        <div id="project-list"></div>
                    </div>
                    <div class="section-block">
                        <div class="section-header">EDUCATION HISTORY</div>
                        <div id="education-list"></div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header"><span class="panel-title">Data Stream</span></div>
                <div class="scroll-area">
                    <div class="section-block">
                        <div class="section-header">TECHNOLOGIES</div>
                        <div id="skill-cloud"></div>
                    </div>
                    <div class="section-block">
                        <div class="section-header">JSON PAYLOAD</div>
                        <div class="code-container">
                            <button class="btn-copy" id="copy-btn" style="position: absolute; top: 0.5rem; right: 0.5rem; font-size: 0.6rem;">COPY</button>
                            <pre id="json-output"></pre>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const overlay = document.getElementById('upload-overlay');
        const dashboard = document.getElementById('dashboard');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        async function handleFile(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            loader.style.display = "block";
            status.textContent = "DECRYPTING STRUCTURAL DATA...";

            try {
                const response = await fetch('http://localhost:8000/parse', { method: 'POST', body: formData });
                const data = await response.json();
                renderUI(data);
                overlay.style.display = "none";
                dashboard.style.display = "grid";
            } catch (err) {
                status.textContent = "ERROR: " + err.message;
                loader.style.display = "none";
            }
        }

        function renderUI(data) {
            document.getElementById('full-name').textContent = `${data.first_name} ${data.last_name}`;
            document.getElementById('job-title').textContent = data.predicted_job_title;
            document.getElementById('avatar').textContent = `${data.first_name[0]}${data.last_name[0]}`;
            document.getElementById('email-pill').textContent = data.personal_email;
            document.getElementById('phone-pill').textContent = data.primary_phone;
            document.getElementById('location-pill').textContent = data.full_address;

            let socialHtml = "";
            if(data.linkedin_url) socialHtml += `<a href="${data.linkedin_url}" target="_blank" class="skill-tag" style="background: #0a66c2; color: #fff; border:none;">LINKEDIN</a>`;
            if(data.github_url) socialHtml += `<a href="${data.github_url}" target="_blank" class="skill-tag" style="background: #24292e; color: #fff; border:none;">GITHUB</a>`;
            if(data.portfolio_url) socialHtml += `<a href="${data.portfolio_url}" target="_blank" class="skill-tag" style="background: var(--accent); color: #000; border:none;">PORTFOLIO</a>`;
            document.getElementById('social-hub').innerHTML = socialHtml;

            document.getElementById('experience-list').innerHTML = data.employment_history.map(j => `
                <div class="item-card">
                    <h4 style="color: #fff;">${j.job_title}</h4>
                    <p style="font-size: 0.8rem; color: var(--primary); margin: 0.2rem 0;">${j.company_name}</p>
                    <p style="font-size: 0.7rem; color: var(--text-muted);">${j.dates || 'Timeline Not Detected'}</p>
                    <p style="font-size: 0.8rem; margin-top: 0.5rem; line-height: 1.4;">${j.description}</p>
                </div>
            `).join('');

            document.getElementById('project-list').innerHTML = data.projects_list.map(p => `
                <div class="item-card">
                    <h4 style="color: #fff;">${p.title}</h4>
                    <p style="font-size: 0.7rem; color: var(--primary); margin: 0.2rem 0;">${p.duration}</p>
                    <p style="font-size: 0.8rem; line-height: 1.4;">${p.description}</p>
                </div>
            `).join('');

            document.getElementById('education-list').innerHTML = data.education_history.map(e => `
                <div class="item-card">
                    <h4 style="color: var(--primary);">${e.degree}</h4>
                    <p style="font-size: 0.85rem; margin: 0.2rem 0;">${e.university || 'University Not Listed'}</p>
                    <p style="font-size: 0.7rem; color: var(--text-muted);">${e.subject} | ${e.dates || 'N/A'}</p>
                </div>
            `).join('');

            document.getElementById('skill-cloud').innerHTML = data.skills.map(s => `<span class="skill-tag">${s.trim().toUpperCase()}</span>`).join('');
            document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);
            document.getElementById('copy-btn').onclick = () => navigator.clipboard.writeText(JSON.stringify(data, null, 2));
        }
    </script>
</body>
</html>

<script>
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const overlay   = document.getElementById('upload-overlay');
const loader    = document.getElementById('loader');
const status    = document.getElementById('status');

dropZone.addEventListener('click',  () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave',  () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

let _lastData = null;

async function handleFile(file) {
  if (!file) return;
  loader.style.display = 'block';
  status.textContent   = 'Extracting structure…';

  const steps = ['Segmenting sections…', 'Parsing entities…', 'Normalising fields…', 'Building payload…'];
  let si = 0;
  const ticker = setInterval(() => { if(si < steps.length) status.textContent = steps[si++]; }, 600);

  try {
    const fd = new FormData();
    fd.append('file', file);
    const res  = await fetch('http://localhost:8000/parse', { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    clearInterval(ticker);
    _lastData = data;
    renderUI(data);
    overlay.style.display  = 'none';
    document.getElementById('dashboard').style.display = 'grid';
    document.getElementById('download-btn').style.display = '';
  } catch (err) {
    clearInterval(ticker);
    status.style.color = '#ef4444';
    status.textContent = '⚠ ' + err.message;
    loader.style.display = 'none';
  }
}

function resetUI() {
  document.getElementById('dashboard').style.display = 'none';
  overlay.style.display   = 'flex';
  loader.style.display    = 'none';
  status.textContent      = '';
  status.style.color      = '';
  fileInput.value         = '';
  document.getElementById('download-btn').style.display = 'none';
}

function downloadJSON() {
  if (!_lastData) return;
  const blob = new Blob([JSON.stringify(_lastData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${(_lastData.first_name || 'resume').toLowerCase()}_parsed.json`;
  a.click();
}

// ── Render ────────────────────────────────────────────────────────────────
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function renderUI(d) {
  // ── Identity
  const initials = `${(d.first_name||'?')[0]}${(d.last_name||'?')[0]}`.toUpperCase();
  document.getElementById('avatar').textContent     = initials;
  document.getElementById('full-name').textContent  = [d.first_name, d.middle_name, d.last_name].filter(Boolean).join(' ');
  document.getElementById('job-title').textContent  = d.predicted_job_title || '—';
  document.getElementById('email-val').textContent  = d.personal_email || '—';
  document.getElementById('phone-val').textContent  = d.primary_phone  || '—';
  document.getElementById('location-val').textContent = d.full_address || '—';

  // Confidence
  const pct = Math.round((d.confidence_score || 0) * 100);
  document.getElementById('conf-fill').style.width = pct + '%';
  document.getElementById('conf-label').textContent = `Confidence: ${pct}%`;
  document.getElementById('confidence-badge').textContent = pct + '%';

  // Social links
  let sh = '';
  if (d.linkedin_url)  sh += `<a href="${esc(d.linkedin_url)}"  target="_blank" class="social-pill" style="background:#0a66c2;color:#fff">🔗 LinkedIn</a>`;
  if (d.github_url)    sh += `<a href="${esc(d.github_url)}"    target="_blank" class="social-pill" style="background:#24292e;color:#fff">🐙 GitHub</a>`;
  if (d.portfolio_url) sh += `<a href="${esc(d.portfolio_url)}" target="_blank" class="social-pill" style="background:var(--accent);color:#000">🌐 Portfolio</a>`;
  (d.other_links || []).forEach(l => {
    const label = l.type === 'coding_profile' ? '💻 Coding' : '🔗 Link';
    sh += `<a href="${esc(l.url)}" target="_blank" class="social-pill" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border)">${label}</a>`;
  });
  document.getElementById('social-hub').innerHTML = sh;

  // Summary
  const sumEl = document.getElementById('summary-block');
  if (d.summary) {
    document.getElementById('summary-text').textContent = d.summary;
    sumEl.style.display = '';
  } else { sumEl.style.display = 'none'; }

  // Languages
  const langEl = document.getElementById('lang-block');
  if (d.languages && d.languages.length) {
    document.getElementById('lang-list').innerHTML = d.languages.map(l =>
      `<span class="tag tag-purple" style="margin:0.15rem">${esc(l.language)}${l.proficiency ? ' · '+esc(l.proficiency):''}</span>`
    ).join('');
    langEl.style.display = '';
  } else { langEl.style.display = 'none'; }

  // Achievements
  const achEl = document.getElementById('ach-block');
  if (d.achievements && d.achievements.length) {
    document.getElementById('ach-list').innerHTML = d.achievements.slice(0,6).map(a =>
      `<div class="item-card accent-amber" style="margin-bottom:0.5rem">
         <div class="item-desc">${esc(a)}</div></div>`
    ).join('');
    achEl.style.display = '';
  } else { achEl.style.display = 'none'; }

  // Certifications
  const certEl = document.getElementById('cert-block');
  if (d.certifications && d.certifications.length) {
    document.getElementById('cert-list').innerHTML = d.certifications.map(c =>
      `<div class="item-card accent-green">
         <div class="item-title">${esc(typeof c === 'string' ? c : c.name)}</div>
         ${c.issuer ? `<div class="item-sub">${esc(c.issuer)}</div>` : ''}
         ${c.date   ? `<div class="item-meta">${esc(c.date)}</div>` : ''}
       </div>`
    ).join('');
    certEl.style.display = '';
  } else { certEl.style.display = 'none'; }

  // Experience
  document.getElementById('exp-list').innerHTML = (d.employment_history || []).length
    ? d.employment_history.map(j => renderCareerItem(j.job_title, j.company_name, j.dates, j.description, j.location)).join('')
    : '<p style="color:var(--muted);font-size:0.8rem">No experience entries detected.</p>';

  // Projects
  document.getElementById('proj-list').innerHTML = (d.projects_list || []).length
    ? d.projects_list.map(p => renderCareerItem(p.title, p.organization, p.duration, p.description, '')).join('')
    : '<p style="color:var(--muted);font-size:0.8rem">No projects detected.</p>';

  // Education
  document.getElementById('edu-list').innerHTML = (d.education_history || []).length
    ? d.education_history.map(e =>
        `<div class="item-card">
           <div class="item-title" style="color:var(--primary)">${esc(e.degree)}</div>
           <div class="item-sub">${esc(e.university || 'University Not Listed')}</div>
           <div class="item-meta">${esc(e.subject || '')}${e.dates ? ' · '+esc(e.dates) : ''}${e.gpa ? ' · GPA '+esc(e.gpa) : ''}</div>
           ${e.details ? `<div class="item-desc">${esc(e.details)}</div>` : ''}
         </div>`
      ).join('')
    : '<p style="color:var(--muted);font-size:0.8rem">No education entries detected.</p>';

  // Skills
  document.getElementById('skill-cloud').innerHTML = (d.skills || []).length
    ? d.skills.map(s => `<span class="skill-tag">${esc(s)}</span>`).join('')
    : '<p style="color:var(--muted);font-size:0.8rem">No skills detected.</p>';

  // Sections detected
  document.getElementById('sections-detected').innerHTML = (d.sections_detected || []).map(s =>
    `<span class="tag tag-green">${esc(s)}</span>`
  ).join('');

  // JSON
  const jsonStr = JSON.stringify(d, null, 2);
  document.getElementById('json-out').textContent = jsonStr;
  document.getElementById('copy-btn').onclick = () => {
    navigator.clipboard.writeText(jsonStr);
    document.getElementById('copy-btn').textContent = '✓ COPIED';
    setTimeout(() => document.getElementById('copy-btn').textContent = 'COPY', 1800);
  };
}

function renderCareerItem(title, org, dates, desc, loc) {
  const bullets = (desc || '').split('•').map(b=>b.trim()).filter(Boolean);
  const descHtml = bullets.length > 1
    ? bullets.map(b => `<span class="item-desc-bullet">${esc(b)}</span>`).join('')
    : `<span>${esc(desc || '')}</span>`;
  return `<div class="item-card">
    <div class="item-title">${esc(title)}</div>
    <div class="item-sub">${esc(org)}${loc ? ' · '+esc(loc) : ''}</div>
    <div class="item-meta">${esc(dates) || '<em>Timeline not detected</em>'}</div>
    ${desc ? `<div class="item-desc">${descHtml}</div>` : ''}
  </div>`;
}
</script>
