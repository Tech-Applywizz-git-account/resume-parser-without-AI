# ─── Docker Compose — ApplyWizz Resume Parser ────────────────────────────────

services:
  resume-parser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: applywizz-resume-parser
    ports:
      - "8000:8000"
    environment:
      # Number of uvicorn worker processes (2–4 × CPU cores is the rule of thumb)
      WEB_CONCURRENCY: 2
    volumes:
      # Ephemeral upload scratch space — survives container restarts
      - uploads_tmp:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  uploads_tmp:
